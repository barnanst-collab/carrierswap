{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold">Chat for Swap #{{ listing_id }}</h1>
        <a href="/dashboard" class="text-blue-600">Back to Dashboard</a>
    </div>
    
    <div class="bg-white border border-slate-200 rounded-2xl p-8 h-96 overflow-y-auto mb-6 text-sm space-y-4">
        <div class="bg-slate-100 p-4 rounded-2xl">Demo message from the other carrier...</div>
        <div class="bg-blue-100 p-4 rounded-2xl ml-auto">Your reply...</div>
    </div>
    
    <form class="flex gap-3">
        <input type="text" placeholder="Type a message..." class="flex-1 border border-slate-300 rounded-2xl px-5 py-3">
        <button type="button" class="bg-blue-600 text-white px-8 rounded-2xl">Send</button>
    </form>
</div>
{% endblock %}
