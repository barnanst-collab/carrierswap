{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold mb-6">Chat with Matched Carrier</h1>
    <div class="bg-white border border-slate-200 rounded-xl p-6 h-96 overflow-y-auto mb-6">
        <p class="text-slate-500">Messages will appear here in the full version.</p>
    </div>
    <div class="flex gap-3">
        <input type="text" placeholder="Type message..." class="flex-1 border border-slate-300 rounded-xl px-4 py-3">
        <button class="bg-blue-600 text-white px-8 rounded-xl">Send</button>
    </div>
</div>
{% endblock %}
