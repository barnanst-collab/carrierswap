{% extends "base.html" %}

{% block title %}Chat{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold mb-6">Chat for Listing {{ listing_id }}</h1>
    <div class="bg-white border border-slate-200 rounded-xl p-8 h-96 flex items-center justify-center text-slate-500">
        Chat interface would go here. Messages between matched carriers.
    </div>
    <div class="mt-6 flex gap-3">
        <input type="text" placeholder="Type a message..." class="flex-1 border border-slate-300 rounded-xl px-4 py-3">
        <button class="bg-blue-600 text-white px-8 rounded-xl">Send</button>
    </div>
</div>
{% endblock %}
