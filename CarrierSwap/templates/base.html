<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CarrierSwap{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-800">CarrierSwap</a>
            <div class="flex gap-x-6 text-sm font-medium">
                <a href="/" class="hover:text-blue-600">Home</a>
                <a href="/dashboard" class="hover:text-blue-600">Dashboard</a>
                <a href="/post" class="hover:text-blue-600">Post Swap</a>
            </div>
            <a href="/demo-login" class="text-blue-600 hover:text-blue-800">Demo Login</a>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
