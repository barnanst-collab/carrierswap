<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CarrierSwap - Free Mutual Transfers{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .hero { background: linear-gradient(135deg, #003087, #1e40af); color: white; }
    </style>
</head>
<body class="bg-slate-50">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-800">CarrierSwap</div>
            <div>
                <a href="/" class="mx-4">Home</a>
                <a href="/dashboard" class="mx-4">Dashboard</a>
                <a href="/post" class="mx-4">Post Swap</a>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}

</html>
