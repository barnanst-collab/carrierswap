{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Login or Sign Up</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0;" required><br>
        <input type="text" name="display_name" placeholder="Display Name" style="width:100%; padding:10px; margin:10px 0;" required><br>
        <button type="submit" style="width:100%; padding:12px; background:#003087; color:white;">Login</button>
    </form>
    <a href="/demo-login">Demo Login</a>
</div>
{% endblock %}
