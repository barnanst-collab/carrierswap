{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold mb-8">Create Account</h1>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" class="w-full border border-slate-300 rounded-xl px-4 py-3 mb-4" required>
        <input type="text" name="display_name" placeholder="Display Name" class="w-full border border-slate-300 rounded-xl px-4 py-3 mb-4" required>
        <button type="submit" class="bg-blue-600 text-white px-10 py-4 rounded-full w-full">Register</button>
    </form>
</div>
{% endblock %}
