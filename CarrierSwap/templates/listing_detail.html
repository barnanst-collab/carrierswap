{% extends "base.html" %}

{% block title %}Listing Detail{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold">{{ listing.current_station }}</h1>
    <p class="text-blue-600">Craft: {{ listing.craft }}</p>
    <p class="text-blue-600">Wants: {{ listing.desired }}</p>
    {% if listing.notes %}
    <p class="mt-6 bg-slate-100 p-6 rounded-2xl">{{ listing.notes }}</p>
    {% endif %}
    <form action="{{ url_for('express_interest', listing_id=listing.id) }}" method="POST" class="mt-8">
        <button type="submit" class="bg-blue-600 text-white px-10 py-4 rounded-full">Express Interest</button>
    </form>
</div>
{% endblock %}
