{% extends "base.html" %}

{% block title %}Listing{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12">
    <h1 class="text-3xl font-bold">Swap Details</h1>
    <p>Station: {{ listing.current_station }}</p>
    <form action="{{ url_for('express_interest', listing_id=listing.id) }}" method="POST">
        <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-full">Express Interest</button>
    </form>
</div>
{% endblock %}
